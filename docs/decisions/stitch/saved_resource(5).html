<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;

      .luxury-gradient {
        background: linear-gradient(135deg, #d4af37 0%, #b08c10 100%);
      }
      .glass-surface {
        background: rgba(18, 18, 18, 0.8);
        backdrop-filter: blur(40px);
        border: 1px solid rgba(212, 175, 55, 0.1);
      }
      .input-focus-border {
        position: relative;
      }
      .input-focus-border::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        width: 0;
        height: 1px;
        background-color: #d4af37;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .input-focus-border:focus-within::after {
        width: 100%;
        left: 0;
      }

<style>
  .toggle-pill {
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);

    display: flex;
    width: 200%;

  }
  .form-slide {
    width: 50%;
    flex-shrink: 0;
  }
  [data-state="register"] .toggle-pill {
    transform: translateX(100%);
  }
  [data-state="register"] .form-slider {
    transform: translateX(-50%);
